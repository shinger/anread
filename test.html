<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨阅 - 登录与注册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="bg-text">文字是思想的墨迹</div>
        
        <div class="auth-card">
            <div class="toggle-group">
                <button id="loginTab" class="active" onclick="switchTab('login')">登录</button>
                <button id="registerTab" onclick="switchTab('register')">注册</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label>账号</label>
                    <input type="text" placeholder="邮箱或用户名" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary">落墨登录</button>
                <div class="form-footer">
                    <a href="#">忘记密码？</a>
                </div>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" placeholder="起一个雅号" required>
                </div>
                <div class="input-group">
                    <label>邮箱</label>
                    <input type="email" placeholder="接收邀请码" required>
                </div>
                <div class="input-group">
                    <label>设定密码</label>
                    <input type="password" placeholder="至少8位字符" required>
                </div>
                <button type="submit" class="btn-primary">开启阅读</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (type === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        }
    </script>
</body>
</html>
