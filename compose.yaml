services:
  # MySQL Database
  mysql:
    image: mysql:8.0.43
    container_name: anread-mysql
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: root   # read from .env file
      MYSQL_DATABASE: anread-mysql                # auto create database
    volumes:
      - anyueread_mysql-data:/var/lib/mysql                # mysql volume
      - ./mysql-config/conf.d:/etc/mysql/conf.d         # mysql config
      # - ./mysql/init-scripts:/docker-entrypoint-initdb.d  # init scripts
    ports:
      - "3306:3306"
    networks:
      - anread-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: anread-qdrant
    restart: no
    volumes:
      - anread_qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC port
    environment:
      - QDRANT__SERVICE__API_KEY=anread@123456

  # Minio Object Storage
  minio:
    image: minio/minio:latest
    container_name: anread-minio
    restart: no
    networks:
      - anread-network
    ports:
      - "0.0.0.0:9000:9000"   # 显式绑定到所有网卡的9000端口
      - "0.0.0.0:9001:9001"   # 显式绑定到所有网卡的9001端口
    volumes:
      - anread_minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin       
      - MINIO_ROOT_PASSWORD=minioadmin   
    command: server /data --address 0.0.0.0:9000 --console-address 0.0.0.0:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # anread-web-user
  web-user:
    build:
      context: ./anread-web-user                    
      dockerfile: Dockerfile
    image: anread-web-user:latest
    container_name: anread-web-user
    restart: no
    environment:
      NODE_ENV: development
      PORT: 5173
    ports:
      - "5173:5173"
    networks:
      - anread-network
    develop:
      watch:
        - action: sync
          path: ./anread-web-user
          target: usr/local/anread/anread-web-user
          ignore:
            - node_modules
        - action: rebuild
          path: ./anread-web-user/vite.config.js ./anread-web-user/package.json

  # anread-web-admin
  web-admin:
    build:
      context: ./anread-web-admin                    
      dockerfile: Dockerfile
    image: anread-web-admin:latest
    container_name: anread-web-admin
    restart: no
    environment:
      NODE_ENV: development
      PORT: 5174
    ports:
      - "5174:5174"
    networks:
      - anread-network
    develop:
      watch:
        - action: sync
          path: ./anread-web-admin
          target: usr/local/anread/anread-web-admin
          ignore:
            - node_modules
        - action: rebuild
          path: ./anread-web-admin/vite.config.js ./anread-web-admin/package.json
          
  # Nacos
  nacos:
    image: nacos/nacos-server:latest
    container_name: anread-nacos
    networks:
      - anread-network
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_SERVER_PORT: 8848
      NACOS_SERVER_ADDR: 0.0.0.0
      NACOS_SERVER_USERNAME: nacos
      NACOS_SERVER_PASSWORD: nacos
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
    volumes:
      - anread_nacos-data:/home/nacos/data

  # Torna API
  torna:
    container_name: anread-api-torna
    image: torna:latest
    restart: no
    ports:
      - "7700:7700"
    volumes:
      - ./torna-config/application.properties:/torna/config/application.properties
    depends_on:
      - mysql
    links:
      - mysql
    networks:
      - anread-network

  # MogoDB
  mongodb:
    image: mongo:latest
    container_name: anread-mongodb
    restart: no
    networks:
      - anread-network
    ports:
      - "27017:27017"
    volumes:
      - anread_mongodb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456

  # Redis
  redis:
    image: redis:8.2.2
    container_name: anread-redis
    restart: no
    networks:
      - anread-network
    ports:
      - "6379:6379"
    volumes:
      - anread_redis-data:/data

  # OCR Service for PDF to EPUB conversion
  pdf2epub:
    build:
      context: ./anread-ocr
      dockerfile: Dockerfile
    image: pdf2epub:latest
    container_name: pdf2epub
    restart: no
    ports:
      - "7000:7000"
    environment:
      # Tesseract binary location (auto-detected; override if needed)
      # TESSERACT_CMD: /usr/bin/tesseract
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      BOOK_API_URL: "http://host.docker.internal:8000/book-api/bookshelf/upload"
      AUTHORIZATION_TOKEN: "s8g0ls-1k3f9"
    volumes:
      # Optional: mount a host directory to persist converted files
      # Remove or comment out if you don't need persistence
      - pdf2epub_tmp:/tmp/pdf2epub
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7000/health')"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Resource limits — OCR on large PDFs is CPU-intensive
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 512M
    develop:
      watch:
        - action: sync
          path: ./anread-ocr
          target: usr/local/anread/anread-ocr
          ignore:
            - node_modules
        - action: rebuild
          path: ./anread-ocr/app/main.py

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: anread-rabbitmq
    restart: no
    networks:
      - anread-network
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    ports:  
      - "5672:5672"
      - "15672:15672"
    volumes:
      - anread_rabbitmq-data:/var/lib/rabbitmq

# network config
networks:
  anread-network:
    driver: bridge

# volume config
volumes:
  anyueread_mysql-data:
    external: true
  anread_mysql-data:
    external: true
  anread_qdrant-data:
    external: true
  anread_minio-data:
    external: true
  anread_nacos-data:
    external: true
  anread_mongodb-data:
    external: true
  anread_redis-data:
    external: true
  pdf2epub_tmp:
    driver: local
  anread_rabbitmq-data:
    external: true
